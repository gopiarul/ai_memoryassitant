<!DOCTYPE html>
<html>
{% load static %}
<head>
    <title>AI Memory Assistant</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: #343541;
            color: white;
            overflow: hidden;
        }

        /* ---------- NAVBAR ---------- */
        .navbar {
            height: 55px;
            background: #202123;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            border-bottom: 1px solid #444;
        }

        .nav-link {
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
        }

        .history { color: #facc15; }
        .memory  { color: #38bdf8; }
        .profile { color: #a78bfa; }
        .settings{ color: #f87171; }

        /* ---------- MAIN LAYOUT ---------- */
        .layout {
            display: flex;
            height: calc(100vh - 55px);
        }

        /* ---------- LEFT HISTORY PANEL ---------- */
        .history-panel {
            width: 260px;
            background: #202123;
            border-right: 1px solid #444;
            padding: 15px;
            overflow-y: auto;
        }

        .history-panel h4 {
            margin-top: 0;
            color: #facc15;
            font-size: 15px;
        }

        .history-item {
            background: #2a2b32;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 13px;
            cursor: pointer;
            opacity: 0.9;
        }

        .history-item:hover {
            background: #3a3b42;
        }

        /* ---------- CHAT AREA ---------- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .msg {
            max-width: 75%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            line-height: 1.4;
        }

        .user {
            background: #0d6efd;
            margin-left: auto;
        }

        .ai {
            background: #19a974;
            margin-right: auto;
        }

        /* ---------- INPUT ---------- */
        form {
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 12px 20px;
            border-radius: 6px;
            border: none;
            background: #19a974;
            color: white;
            cursor: pointer;
        }

        .mic-btn {
            margin-top: 8px;
            width: 120px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a class="nav-link history" href="{% url 'history' %}">📜 History</a>
    <a class="nav-link memory" href="{% url 'memory' %}">🧠 Memory</a>
    <a class="nav-link profile" href="{% url 'profile' %}">👤 Profile</a>
    <a class="nav-link settings" href="{% url 'settings' %}">⚙ Settings</a>
</div>

<!-- MAIN -->
<div class="layout">

    <!-- LEFT CHAT HISTORY -->
    <div class="history-panel">
        <h4>Chats</h4>
        {% for m in memories %}
            <div class="history-item">
                {{ m.user_query|truncatechars:35 }}
            </div>
        {% empty %}
            <p style="opacity:0.6">No chats yet</p>
        {% endfor %}
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area">
        <div class="chat-box" id="chatBox">
            {% for m in memories %}
                <div class="msg user"><b>You:</b> {{ m.user_query }}</div>
                <div class="msg ai"><b>AI:</b> {{ m.assistant_reply }}</div>
            {% endfor %}
        </div>

        <form method="post" id="textForm">
            {% csrf_token %}
            <input type="text" name="query" id="textQuery" placeholder="Ask anything..." required>
            <button type="submit">Send</button>
        </form>

        <button class="mic-btn" onclick="startListening()">🎤 Speak</button>
    </div>

</div>

<!-- JS -->
<script>
const chatBox = document.getElementById("chatBox");
chatBox.scrollTop = chatBox.scrollHeight;

// 🔊 SPEAK FUNCTION
function speakText(text) {
    if (!text) return;
    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "en-US";
    speechSynthesis.speak(msg);
}

// 🎤 VOICE INPUT
function startListening() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = e => {
        document.getElementById("textQuery").value =
            e.results[0][0].transcript;
        document.getElementById("textForm").submit();
    };
}

// 🔥 SPEAK ONLY NEW RESPONSE FROM BACKEND
const newSpeech = "{{ speak_text|escapejs }}";
if (newSpeech) {
    speakText(newSpeech);
}
</script>

</body>
</html>
