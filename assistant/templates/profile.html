<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>
/* ---------- GLOBAL ---------- */
body {
    background: linear-gradient(135deg, #111827, #1f2933);
    color: #e5e7eb;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    padding: 20px;
    margin: 0;
}

/* ---------- TITLE ---------- */
h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* ---------- PROFILE CARD ---------- */
.profile-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 18px;
    max-width: 420px;
    margin: auto;
    text-align: center;
    box-shadow: 0 10px 35px rgba(0,0,0,0.4);
    animation: fadeIn 0.8s ease;
}

/* ---------- PROFILE IMAGE ---------- */
.profile-card img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #22c55e;
    box-shadow: 0 0 25px rgba(34,197,94,0.7);
    transition: transform 0.3s;
}

.profile-card img:hover {
    transform: scale(1.05);
}

/* ---------- USER INFO ---------- */
.info {
    margin-top: 15px;
    font-size: 15px;
}

/* ---------- STATS ---------- */
.stats {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

.stat {
    flex: 1;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    padding: 15px;
    border-radius: 12px;
    font-weight: bold;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    transition: transform 0.3s;
}

.stat:hover {
    transform: translateY(-5px);
}

/* ---------- BUTTONS ---------- */
.actions {
    margin-top: 25px;
}

.actions a {
    display: inline-block;
    margin: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    transition: all 0.3s;
}

.back {
    background: #2563eb;
    color: white;
}

.edit {
    background: #f97316;
    color: white;
}

.actions a:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

/* ---------- ANIMATION ---------- */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ---------- RESPONSIVE ---------- */
@media(max-width: 500px) {
    .stats {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<h2>👤 Profile</h2>

<div class="profile-card">

    <img src="{{ request.user.profile.image.url }}" alt="Profile Image">

    <div class="info">
        <p><b>Username:</b> {{ user.username }}</p>
        <p><b>Date Joined:</b> {{ user.date_joined|date:"d M Y" }}</p>
    </div>

    <div class="stats">
        <div class="stat">📊 Commands<br>{{ total_commands }}</div>
        <div class="stat">🧠 Memories<br>{{ total_memory }}</div>
    </div>

    <div class="actions">
        <a class="back" href="{% url 'dashboard' %}">⬅ Dashboard</a>
        <a class="edit" href="{% url 'settings' %}">✏ Edit Profile</a>
    </div>

</div>

</body>
</html>
