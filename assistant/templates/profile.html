<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>

/* ================= GLOBAL ================= */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
    padding: 40px;
}

/* ================= CONTAINER ================= */
.container {
    max-width: 1100px;
    margin: auto;
}

/* ================= TOP SECTION ================= */
.profile-wrapper {
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 30px;
}

/* ================= LEFT CARD ================= */
.profile-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}

.profile-card img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #22c55e;
    box-shadow: 0 0 30px rgba(34,197,94,0.6);
}

.profile-card h2 {
    margin-top: 15px;
    margin-bottom: 5px;
}

.badge {
    display: inline-block;
    padding: 6px 12px;
    background: #22c55e;
    border-radius: 20px;
    font-size: 12px;
    margin-top: 5px;
}

/* ================= RIGHT CARD ================= */
.details-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}

.details-card h3 {
    margin-bottom: 20px;
}

.detail-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.detail-row span:first-child {
    color: #94a3b8;
}

/* ================= STATS ================= */
.stats {
    display: flex;
    gap: 20px;
    margin-top: 30px;
}

.stat-box {
    flex: 1;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    font-weight: bold;
}

/* ================= SOCIAL ================= */
.social {
    margin-top: 30px;
}

.social a {
    margin-right: 15px;
    text-decoration: none;
    font-size: 20px;
}

/* ================= RESPONSIVE ================= */
@media(max-width: 900px){
    .profile-wrapper {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<div class="container">

<div class="profile-wrapper">

    <!-- LEFT PROFILE -->
    <div class="profile-card">
        <img src="{{ request.user.profile.image.url }}" alt="Profile">

        <h2>{{ user.username }}</h2>
        <div class="badge">Premium User</div>

        <div class="stats">
            <div class="stat-box">
                {{ total_commands }}<br>Commands
            </div>
            <div class="stat-box">
                {{ total_memory }}<br>Memories
            </div>
        </div>
    </div>

    <!-- RIGHT DETAILS -->
    <div class="details-card">
        <h3>Bio & Other Details</h3>

        <div class="detail-row">
            <span>Date Joined</span>
            <span>{{ user.date_joined|date:"d M Y" }}</span>
        </div>

        <div class="detail-row">
            <span>Email</span>
            <span>{{ user.email }}</span>
        </div>

        <div class="detail-row">
            <span>Status</span>
            <span style="color:#22c55e;">● Active</span>
        </div>

        <div class="detail-row">
            <span>Total Memories</span>
            <span>{{ total_memory }}</span>
        </div>

        <div class="social">
            <h4>Social Media</h4>
            <a href="#">🔴</a>
            <a href="#">📸</a>
            <a href="#">🎵</a>
            <a class="back" href="{% url 'dashboard' %}">⬅️</a>
        <a class="edit" href="{% url 'settings' %}">🎬</a>
        </div>

    </div>

</div>

</div>

</body>
</html>
