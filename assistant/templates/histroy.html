<!DOCTYPE html>
<html>
<head>
<title>Chat History</title>

<style>
/* ---------- GLOBAL ---------- */
body {
    background: linear-gradient(135deg, #1f2933, #111827);
    color: #e5e7eb;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    padding: 20px;
    margin: 0;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* ---------- TOP BAR ---------- */
.top-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.top-bar form {
    display: flex;
    gap: 10px;
    flex: 1;
}

.top-bar input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
}

.top-bar button {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #22c55e;
    color: white;
}

/* ---------- EXPORT BUTTONS ---------- */
.export {
    text-align: center;
    margin: 20px 0;
}

.export button {
    padding: 10px 18px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.csv { background: #22c55e; color: white; }
.pdf { background: #ef4444; color: white; }

/* ---------- HISTORY CARD ---------- */
.history-container {
    max-width: 900px;
    margin: auto;
}

.box {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding: 18px;
    margin-bottom: 15px;
    border-radius: 14px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.box:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.12);
}

.date {
    font-size: 12px;
    color: #9ca3af;
    margin-bottom: 5px;
}

.you {
    color: #60a5fa;
}

.ai {
    color: #34d399;
}

/* ---------- ACTIONS ---------- */
.actions {
    margin-top: 10px;
    text-align: right;
}

.actions a {
    color: #f87171;
    text-decoration: none;
    font-size: 14px;
}

/* ---------- DELETE BY DATE ---------- */
.delete-date {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 12px;
    max-width: 500px;
    margin: 30px auto;
    text-align: center;
}

.delete-date input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    margin: 5px;
}

.delete-date button {
    padding: 8px 16px;
    background: #dc2626;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

/* ---------- FOOTER ---------- */
.footer {
    text-align: center;
    margin-top: 30px;
}

.footer a {
    color: #93c5fd;
    text-decoration: none;
}

/* ---------- RESPONSIVE ---------- */
@media(max-width: 600px) {
    .top-bar {
        flex-direction: column;
        gap: 10px;
    }
}
</style>
</head>

<body>

<h2>🕒 Chat History</h2>

<div class="top-bar">
    <form method="get">
        <input name="q" placeholder="Search history..." value="{{ search }}">
        <button>Search</button>
    </form>

    <a href="{% url 'clear_history' %}" onclick="return confirm('Delete all history?')">
        <button style="background:#dc2626;">Clear All</button>
    </a>
</div>

<div class="export">
    <a href="{% url 'export_csv' %}">
        <button class="csv">⬇ Download CSV</button>
    </a>

    <a href="{% url 'export_pdf' %}">
        <button class="pdf">⬇ Download PDF</button>
    </a>
</div>

<div class="history-container">
{% for h in histories %}
    <div class="box">
        <div class="date">{{ h.created_at }}</div>

        <b class="you">You:</b> {{ h.user_query }} <br><br>
        <b class="ai">AI:</b> {{ h.assistant_reply }}

        <div class="actions">
            <a href="{% url 'delete_history' h.id %}">🗑 Delete</a>
        </div>
    </div>
{% empty %}
    <p style="text-align:center;">No history found 🚀</p>
{% endfor %}
</div>

<div class="delete-date">
    <h3>📆 Delete by Date</h3>
    <form method="post" action="{% url 'delete_date' %}">
        {% csrf_token %}
        <input type="date" name="start" required>
        <input type="date" name="end" required>
        <br><br>
        <button>Delete</button>
    </form>
</div>

<div class="footer">
    <a href="{% url 'dashboard' %}">⬅ Back to Dashboard</a>
</div>

</body>
</html>
